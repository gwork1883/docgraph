name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: go test -buildvcs=false ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME:-dev}"
          if [ "$version" = "${GITHUB_SHA}" ]; then
            version="dev-${GITHUB_SHA::7}"
          fi
          name="docgraph_${version}_${GOOS}_${GOARCH}"
          ext=""
          if [ "$GOOS" = "windows" ]; then
            ext=".exe"
          fi
          mkdir -p "dist/$name"
          go build -trimpath -buildvcs=false -ldflags="-s -w -X main.version=$version" -o "dist/$name/docgraph$ext" ./cmd/docgraph
          cp README.md "dist/$name/"
          if [ "$GOOS" = "windows" ]; then
            (cd dist && zip -qr "$name.zip" "$name")
            archive="$name.zip"
          else
            tar -czf "dist/$name.tar.gz" -C dist "$name"
            archive="$name.tar.gz"
          fi
          (cd dist && sha256sum "$archive" > "checksums_${GOOS}_${GOARCH}.txt")
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docgraph-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums_*.txt
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
